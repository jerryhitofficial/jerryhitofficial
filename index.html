<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerryhit | Links</title>
    <style>
        /* Обнуление стилей и шрифт */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Розовая шапка сверху */
        .header-bg {
            background-color: #ff007f;
            width: 100%;
            height: 150px;
            position: relative;
            margin-bottom: 75px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Текстовый блок */
        .profile-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .verified-badge {
            background-color: #ff007f;
            color: #ffffff;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
        }

        /* Контейнер кнопок */
        .links-container {
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
        }
        
        /* Базовый стиль кнопок */
        .link-btn {
            display: block;
            width: 100%;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Жесткий классический отступ между кнопками */
        .space-between {
            margin-top: 14px;
        }

        /* Стиль для кнопки-текста (Press & Hold в Инсте) */
        .hold-text-btn {
            display: block;
            width: 100%;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            
            /* Разрешаем выделение текста операционной системой телефона */
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-touch-callout: default !important;
        }

        /* Изначально все блоки скрыты, CSS их не покажет, пока JS не уберет этот класс */
        .hidden-block {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Jerryhit">
        </div>
    </div>

    <div class="profile-info">
        <h1 class="username">Jerryhit <span class="verified-badge">✓</span></h1>
        <p class="subtitle">Model & Content Creator</p>
    </div>

    <div id="instagram-view" class="links-container hidden-block">
        <a href="" class="hold-text-btn" id="fake-btn">Press & Hold</a>
    </div>

    <div id="normal-view" class="links-container hidden-block">
        <a href="https://onlyfans.com/jerry_hitfree" target="_blank" class="link-btn">Exclusive Content</a>
        <a href="https://t.me/jerryhitofficial" target="_blank" class="link-btn space-between">Telegram channel</a>
    </div>

    <script>
        // Чистим текущую ссылку от лишних хвостов Инстаграма для чистой кнопки удержания
        const rawUrl = window.location.href.split('?')[0];
        document.getElementById('fake-btn').href = rawUrl;

        // Самая надежная проверка: смотрим, есть ли в адресной строке метки Инстаграма
        const currentSearch = window.location.search;
        const isInstagramUrl = currentSearch.includes('fbclid') || currentSearch.includes('instagram') || currentSearch.includes('igshid');
        
        // Дополнительная проверка по системе телефона на случай, если метки стерлись
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isInstagramApp = (ua.indexOf('Instagram') > -1) || (ua.indexOf('FBAN') > -1) || (ua.indexOf('FBAV') > -1);

        const instagramView = document.getElementById('instagram-view');
        const normalView = document.getElementById('normal-view');

        // Если хоть одна проверка подтвердила Инстаграм — включаем удержание
        if (isInstagramUrl || isInstagramApp) {
            instagramView.classList.remove('hidden-block');
            normalView.classList.add('hidden-block');
        } else {
            // Если открыли в нормальном браузере — показываем кнопки
            instagramView.classList.add('hidden-block');
            normalView.classList.remove('hidden-block');
        }

        // Блокируем обычный клик по кнопке удержания
        document.getElementById('fake-btn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
    </script>

</body>
</html>
