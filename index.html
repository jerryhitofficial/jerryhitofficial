<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerryhit | Links</title>
    <style>
        /* Обнуление стилей и шрифт */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none; /* Запрещает выделение текста, чтобы кнопка ощущалась как приложение */
            -webkit-user-select: none;
        }

        /* Розовая шапка сверху */
        .header-bg {
            background-color: #ff007f;
            width: 100%;
            height: 150px;
            position: relative;
            margin-bottom: 75px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Текстовый блок */
        .profile-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .verified-badge {
            background-color: #ff007f;
            color: #ffffff;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
        }

        /* Контейнер кнопки */
        .links-container {
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
        }
        
        /* Кнопка "Press & Hold" */
        .link-btn {
            display: block;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        .link-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Jerryhit">
        </div>
    </div>

    <div class="profile-info">
        <h1 class="username">Jerryhit <span class="verified-badge">✓</span></h1>
        <p class="subtitle">Model & Content Creator</p>
    </div>

    <div class="links-container">
        <a href="https://jerryhitofficial.github.io/jerryhit/" id="hold-btn" class="link-btn">Press & Hold</a>
    </div>

    <script>
        const button = document.getElementById('hold-btn');
        const targetUrl = button.href;

        button.addEventListener('click', function(e) {
            // Проверяем, находится ли пользователь внутри встроенного браузера Instagram
            const isInstagram = /Instagram/.test(navigator.userAgent);

            if (isInstagram) {
                e.preventDefault(); // Останавливаем стандартное открытие
                
                // Трюк для Android: пытается принудительно открыть через Intent во внешнем браузере
                if (/Android/i.test(navigator.userAgent)) {
                    const intentUrl = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
                    window.location.href = intentUrl;
                } else {
                    // Для iOS (iPhone) нет прямого способа выйти из Instagram по клику,
                    // поэтому открываем в новой вкладке, как просил
                    window.open(targetUrl, '_blank');
                }
            }
        });
    </script>

</body>
</html>
