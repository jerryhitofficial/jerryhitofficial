<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerryhit | Links</title>
    <style>
        /* Обнуление стилей и шрифт */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Розовая шапка сверху */
        .header-bg {
            background-color: #ff007f;
            width: 100%;
            height: 150px;
            position: relative;
            margin-bottom: 75px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Текстовый блок */
        .profile-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .verified-badge {
            background-color: #ff007f;
            color: #ffffff;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
        }

        /* Контейнер кнопок */
        .links-container {
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Базовый стиль кнопок */
        .link-btn {
            display: block;
            width: 100%;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        /* Стиль для кнопки-текста (Press & Hold в Инсте) */
        .hold-text-btn {
            display: block;
            width: 100%;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            
            /* Разрешаем выделение текста операционной системой телефона */
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-touch-callout: default !important;
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        /* Изначально скрываем оба режима, их включит JavaScript */
        #instagram-view, #normal-view {
            display: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Jerryhit">
        </div>
    </div>

    <div class="profile-info">
        <h1 class="username">Jerryhit <span class="verified-badge">✓</span></h1>
        <p class="subtitle">Model & Content Creator</p>
    </div>

    <div id="instagram-view" class="links-container">
        <a href="" class="hold-text-btn" id="fake-btn">Press & Hold</a>
    </div>

    <div id="normal-view" class="links-container">
        <a href="https://onlyfans.com/jerry_hitfree" target="_blank" class="link-btn">Exclusive Content</a>
        <a href="https://t.me/jerryhitofficial" target="_blank" class="link-btn">Telegram channel</a>
    </div>

    <script>
        // Записываем текущий URL сайта на GitHub
        const currentUrl = window.location.href;
        
        // Автоматически подставляем адрес нашего сайта в кнопку Press & Hold
        document.getElementById('fake-btn').href = currentUrl;

        function checkUserAgent() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // Проверяем, открыт ли сайт внутри приложения Instagram
            const isInstagram = (ua.indexOf('Instagram') > -1) || (ua.indexOf('FBAN') > -1) || (ua.indexOf('FBAV') > -1);
            
            const instagramView = document.getElementById('instagram-view');
            const normalView = document.getElementById('normal-view');

            if (isInstagram) {
                // Если пользователь пришел ИЗ ИНСТАГРАМА — включаем заглушку Press & Hold
                instagramView.style.style.display = 'block';
                instagramView.style.display = 'block';
                normalView.style.display = 'none';
            } else {
                // Если пользователь открыл сайт в обычном браузере (Safari / Chrome) — показываем обе кнопки
                instagramView.style.display = 'none';
                normalView.style.display = 'block';
            }
        }

        // Запуск проверки при загрузке страницы
        window.addEventListener('DOMContentLoaded', checkUserAgent);

        // Полностью блокируем обычный короткий клик по кнопке Press & Hold внутри Instagram
        document.getElementById('fake-btn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
    </script>

</body>
</html>
