<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerryhit | Links</title>
    <style>
        /* Обнуление стилей и шрифт */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Розовая шапка сверху */
        .header-bg {
            background-color: #ff007f;
            width: 100%;
            height: 150px;
            position: relative;
            margin-bottom: 75px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Текстовый блок */
        .profile-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .verified-badge {
            background-color: #ff007f;
            color: #ffffff;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
        }

        /* Контейнер кнопки */
        .links-container {
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
        }
        
        /* Кнопка "Press & Hold" */
        .link-btn {
            display: block;
            background-color: #ff007f;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            
            /* Важные свойства для корректного вызова меню на iOS/Android */
            -webkit-touch-callout: default !important;
            -webkit-user-select: text !important;
            user-select: text !important;
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Jerryhit">
        </div>
    </div>

    <div class="profile-info">
        <h1 class="username">Jerryhit <span class="verified-badge">✓</span></h1>
        <p class="subtitle">Model & Content Creator</p>
    </div>

    <div class="links-container">
        <a href="https://jerryhitofficial.github.io/jerryhit/" id="hold-btn" class="link-btn">Press & Hold</a>
    </div>

    <script>
        const button = document.getElementById('hold-btn');

        // Жесткое глушение вообще всех мобильных тапов (нажатий пальцем)
        button.addEventListener('touchstart', function(e) {
            // Позволяем работать только долгому нажатию, не сбрасываем базовое поведение системы
        }, {passive: true});

        button.addEventListener('touchend', function(e) {
            // Если это был быстрый одиночный тап — полностью блокируем его последствия
            if (e.cancelable) {
                e.preventDefault();
            }
        });

        // Блокировка для кликов мышкой (десктоп)
        button.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
    </script>

</body>
</html>
